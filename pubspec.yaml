name: anime_deduction_tower
description: A Flutter + Flame mobile deduction game built as a portfolio project.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flame: ^1.18.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/characters.json
    - assets/data/tags.json
    - assets/data/categories.json
    - assets/images/characters/
    - assets/images/backgrounds/
    - assets/images/icons/
    - assets/images/placeholders/
    - assets/audio/sfx/
    - assets/audio/music/
    - assets/fonts/
